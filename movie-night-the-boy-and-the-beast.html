<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Night — The Boy and the Beast</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a0e05;
    --amber: #c97b2a;
    --amber-light: #e8a84a;
    --cream: #f5ead8;
    --indigo: #2a3560;
    --deep: #0d0a14;
    --red: #8c2020;
    --gold: #d4a830;
  }

  body {
    background: var(--deep);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Lora', serif;
    padding: 2rem;
  }

  .poster {
    width: 520px;
    background: var(--cream);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(201,123,42,0.3), 0 0 200px rgba(0,0,0,0.8);
    animation: fadeIn 1.2s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Paper texture overlay */
  .poster::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 200px;
    opacity: 0.5;
    pointer-events: none;
    z-index: 10;
    mix-blend-mode: multiply;
  }

  /* Border frame */
  .frame-outer {
    position: absolute;
    inset: 10px;
    border: 2px solid var(--amber);
    z-index: 5;
    pointer-events: none;
  }
  .frame-inner {
    position: absolute;
    inset: 15px;
    border: 1px solid rgba(201,123,42,0.4);
    z-index: 5;
    pointer-events: none;
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    z-index: 6;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 6px; left: 6px; }
  .corner.tr { top: 6px; right: 6px; transform: scaleX(-1); }
  .corner.bl { bottom: 6px; left: 6px; transform: scaleY(-1); }
  .corner.br { bottom: 6px; right: 6px; transform: scale(-1,-1); }

  /* Sky gradient section */
  .sky {
    height: 300px;
    position: relative;
    background: linear-gradient(180deg,
      #0d1a3a 0%,
      #1a2d5a 30%,
      #2a3560 55%,
      #8b5e3c 75%,
      #c97b2a 88%,
      #e8a84a 100%
    );
    overflow: hidden;
  }

  /* Moon */
  .moon {
    position: absolute;
    top: 30px;
    right: 80px;
    width: 60px;
    height: 60px;
    background: radial-gradient(circle at 40% 40%, #fffbe8, #f5d97a);
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(245,217,122,0.6), 0 0 60px rgba(245,217,122,0.2);
    animation: moonGlow 4s ease-in-out infinite alternate;
  }
  @keyframes moonGlow {
    from { box-shadow: 0 0 30px rgba(245,217,122,0.6), 0 0 60px rgba(245,217,122,0.2); }
    to   { box-shadow: 0 0 40px rgba(245,217,122,0.9), 0 0 80px rgba(245,217,122,0.35); }
  }

  /* Stars */
  .stars {
    position: absolute;
    inset: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--a, 0.4); transform: scale(1); }
    to   { opacity: 1; transform: scale(1.4); }
  }

  /* Ink-brush mountains */
  .mountains {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 180px;
  }

  /* Silhouette scene */
  .silhouette-base {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: var(--ink);
    clip-path: polygon(
      0% 100%, 0% 60%, 5% 55%, 12% 65%, 18% 40%, 25% 50%, 30% 30%,
      36% 45%, 42% 20%, 50% 40%, 56% 25%, 63% 38%, 70% 15%, 78% 35%,
      84% 50%, 90% 40%, 95% 55%, 100% 45%, 100% 100%
    );
  }

  /* Torii gate */
  .torii {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    z-index: 2;
  }

  /* Figures */
  .figures {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: flex-end;
    gap: 6px;
    z-index: 3;
  }

  /* Content section */
  .content {
    background: var(--cream);
    padding: 24px 32px 28px;
    position: relative;
    z-index: 2;
  }

  .eyebrow {
    font-family: 'Lora', serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--amber);
    text-align: center;
    margin-bottom: 10px;
    animation: slideUp 0.8s 0.3s ease both;
  }

  .title-jp {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--indigo);
    text-align: center;
    letter-spacing: 0.15em;
    margin-bottom: 6px;
    animation: slideUp 0.8s 0.4s ease both;
  }

  .title-en {
    font-family: 'Cinzel Decorative', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    line-height: 1.15;
    letter-spacing: 0.02em;
    animation: slideUp 0.8s 0.5s ease both;
  }

  .title-en em {
    color: var(--red);
    font-style: normal;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 14px 0;
    animation: slideUp 0.8s 0.6s ease both;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--amber), transparent);
  }
  .divider-symbol {
    font-size: 14px;
    color: var(--amber);
  }

  .tagline {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 13.5px;
    color: #4a3a28;
    text-align: center;
    line-height: 1.7;
    margin-bottom: 18px;
    animation: slideUp 0.8s 0.7s ease both;
  }

  .meta-strip {
    display: flex;
    justify-content: center;
    gap: 0;
    background: var(--indigo);
    margin: 0 -32px -28px;
    padding: 12px 32px;
    animation: slideUp 0.8s 0.9s ease both;
  }

  .meta-item {
    text-align: center;
    flex: 1;
    position: relative;
  }
  .meta-item + .meta-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 10%;
    height: 80%;
    width: 1px;
    background: rgba(201,123,42,0.4);
  }

  .meta-label {
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--amber-light);
    display: block;
    margin-bottom: 3px;
    font-family: 'Lora', serif;
  }

  .meta-value {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    font-weight: 600;
    color: white;
  }

  .popcorn-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 8px 0 2px;
    font-size: 18px;
    animation: slideUp 0.8s 0.8s ease both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

</style>
</head>
<body>
<div class="poster">
  <!-- Corner ornaments -->
  <div class="corner tl">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 26 L2 2 L26 2" stroke="#c97b2a" stroke-width="1.5" fill="none"/>
      <path d="M2 14 Q8 8 14 2" stroke="#c97b2a" stroke-width="0.8" fill="none" opacity="0.5"/>
      <circle cx="2" cy="2" r="2.5" fill="#c97b2a"/>
    </svg>
  </div>
  <div class="corner tr">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 26 L2 2 L26 2" stroke="#c97b2a" stroke-width="1.5" fill="none"/>
      <path d="M2 14 Q8 8 14 2" stroke="#c97b2a" stroke-width="0.8" fill="none" opacity="0.5"/>
      <circle cx="2" cy="2" r="2.5" fill="#c97b2a"/>
    </svg>
  </div>
  <div class="corner bl">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 26 L2 2 L26 2" stroke="#c97b2a" stroke-width="1.5" fill="none"/>
      <path d="M2 14 Q8 8 14 2" stroke="#c97b2a" stroke-width="0.8" fill="none" opacity="0.5"/>
      <circle cx="2" cy="2" r="2.5" fill="#c97b2a"/>
    </svg>
  </div>
  <div class="corner br">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 26 L2 2 L26 2" stroke="#c97b2a" stroke-width="1.5" fill="none"/>
      <path d="M2 14 Q8 8 14 2" stroke="#c97b2a" stroke-width="0.8" fill="none" opacity="0.5"/>
      <circle cx="2" cy="2" r="2.5" fill="#c97b2a"/>
    </svg>
  </div>
  <div class="frame-outer"></div>
  <div class="frame-inner"></div>

  <!-- Sky scene -->
  <div class="sky">
    <div class="moon"></div>
    <div class="stars" id="stars"></div>

    <!-- SVG scene -->
    <svg class="mountains" viewBox="0 0 520 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Far mountains (ink-brush style) -->
      <path d="M0 180 L0 110 Q30 60 60 90 Q90 50 120 70 Q150 30 180 55 Q210 20 240 45 Q270 15 300 40 Q330 25 360 50 Q390 35 420 60 Q450 45 480 70 Q500 55 520 65 L520 180 Z"
            fill="#1a1428" opacity="0.7"/>
      <!-- Near mountains -->
      <path d="M0 180 L0 130 Q40 90 70 115 Q100 80 130 100 Q160 60 200 85 Q230 50 260 75 Q290 40 320 65 Q350 55 380 80 Q420 60 460 90 Q490 70 520 85 L520 180 Z"
            fill="#100d1e" opacity="0.9"/>
      <!-- Ground -->
      <rect x="0" y="145" width="520" height="35" fill="#1a0e05"/>

      <!-- Torii gate -->
      <g transform="translate(240,85)">
        <!-- Top beam (kasagi) with curve -->
        <path d="M-28 0 Q0 -8 28 0" stroke="#8c2020" stroke-width="5" fill="none" stroke-linecap="round"/>
        <!-- Second beam (nuki) -->
        <line x1="-22" y1="8" x2="22" y2="8" stroke="#8c2020" stroke-width="3"/>
        <!-- Pillars -->
        <line x1="-20" y1="2" x2="-20" y2="60" stroke="#8c2020" stroke-width="4"/>
        <line x1="20" y1="2" x2="20" y2="60" stroke="#8c2020" stroke-width="4"/>
        <!-- Foot blocks -->
        <rect x="-24" y="58" width="8" height="4" rx="1" fill="#8c2020"/>
        <rect x="16" y="58" width="8" height="4" rx="1" fill="#8c2020"/>
      </g>

      <!-- Boy silhouette (right of gate) -->
      <g transform="translate(278,118)">
        <circle cx="0" cy="-22" r="5" fill="#1a0e05"/>
        <path d="M0 -17 L0 0" stroke="#1a0e05" stroke-width="4" stroke-linecap="round"/>
        <path d="M-8 -10 L8 -10" stroke="#1a0e05" stroke-width="3" stroke-linecap="round"/>
        <path d="M0 0 L-5 12 M0 0 L5 12" stroke="#1a0e05" stroke-width="3.5" stroke-linecap="round"/>
      </g>

      <!-- Beast silhouette (left of gate, larger, bear/wolf-like) -->
      <g transform="translate(205,112)">
        <!-- Beast body -->
        <ellipse cx="0" cy="0" rx="14" ry="12" fill="#1a0e05"/>
        <!-- Head -->
        <circle cx="10" cy="-14" r="10" fill="#1a0e05"/>
        <!-- Ears -->
        <path d="M4 -22 L0 -30 L8 -23" fill="#1a0e05"/>
        <path d="M14 -22 L18 -30 L20 -22" fill="#1a0e05"/>
        <!-- Tail -->
        <path d="M-14 -4 Q-24 -16 -20 -24" stroke="#1a0e05" stroke-width="5" fill="none" stroke-linecap="round"/>
        <!-- Legs -->
        <path d="M-6 10 L-8 22 M6 10 L8 22" stroke="#1a0e05" stroke-width="4" stroke-linecap="round"/>
        <!-- Arm reaching -->
        <path d="M10 -6 Q20 -2 24 6" stroke="#1a0e05" stroke-width="4" stroke-linecap="round" fill="none"/>
      </g>

      <!-- Floating fireflies/sparks -->
      <circle cx="165" cy="100" r="1.5" fill="#f5d97a" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="310" cy="90" r="1.5" fill="#f5d97a" opacity="0.6">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="355" cy="105" r="1" fill="#f5d97a" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="190" cy="85" r="1" fill="#e8a84a" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="330" cy="75" r="1.2" fill="#f5d97a" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </svg>
  </div>

  <!-- Text content -->
  <div class="content">
    <p class="eyebrow">Family Movie Night</p>

    <p class="title-jp">バケモノの子</p>

    <h1 class="title-en">The <em>Boy</em> &<br>The <em>Beast</em></h1>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-symbol">⊕</span>
      <div class="divider-line"></div>
    </div>

    <p class="tagline">
      A boy lost between worlds.<br>
      A beast who does not know how to love.<br>
      <em>A bond that will change them both.</em>
    </p>

    <div class="popcorn-row">🍿 🎬 🍜</div>

    <div class="meta-strip">
      <div class="meta-item">
        <span class="meta-label">Director</span>
        <span class="meta-value">Mamoru Hosoda</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Tonight</span>
        <span class="meta-value">Movie Night</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Runtime</span>
        <span class="meta-value">119 min</span>
      </div>
    </div>
  </div>
</div>

<script>
  // Generate stars
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 40; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 1;
    star.style.cssText = `
      width: ${size}px; height: ${size}px;
      top: ${Math.random() * 65}%;
      left: ${Math.random() * 100}%;
      --a: ${Math.random() * 0.5 + 0.3};
      --d: ${Math.random() * 3 + 1.5}s;
      animation-delay: ${Math.random() * 3}s;
    `;
    starsContainer.appendChild(star);
  }
</script>
</body>
</html>
