<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pan's Labyrinth Quiz</title>
    <style>
        :root {
            --bg-1: #08110d;
            --bg-2: #102019;
            --panel: rgba(14, 25, 21, 0.92);
            --panel-2: rgba(20, 35, 29, 0.96);
            --gold: #d9bf78;
            --gold-soft: #b89b5d;
            --text: #f1ead7;
            --muted: #b9b09b;
            --line: rgba(217, 191, 120, 0.22);
            --green-glow: rgba(110, 150, 110, 0.18);
            --correct-bg: rgba(65, 110, 72, 0.28);
            --correct-border: rgba(122, 191, 119, 0.55);
            --wrong-bg: rgba(120, 55, 45, 0.32);
            --wrong-border: rgba(202, 111, 92, 0.5);
            --warning-bg: rgba(125, 98, 29, 0.24);
            --warning-border: rgba(217, 191, 120, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 20%, rgba(92, 126, 93, 0.12), transparent 28%),
                radial-gradient(circle at 80% 18%, rgba(137, 119, 69, 0.08), transparent 24%),
                radial-gradient(circle at 50% 100%, rgba(31, 61, 46, 0.42), transparent 42%),
                linear-gradient(180deg, #0a120e 0%, #0f1b16 48%, #07100c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background:
                radial-gradient(circle at 8% 78%, rgba(94, 133, 95, 0.15), transparent 18%),
                radial-gradient(circle at 92% 82%, rgba(94, 133, 95, 0.12), transparent 16%),
                radial-gradient(circle at 48% 16%, rgba(217, 191, 120, 0.05), transparent 14%);
            filter: blur(8px);
        }

        body::after {
            background-image:
                linear-gradient(rgba(255,255,255,0.015), rgba(255,255,255,0.015));
            opacity: 0.5;
            mix-blend-mode: soft-light;
        }

        .container {
            width: 100%;
            max-width: 760px;
            position: relative;
        }

        .frame {
            position: relative;
            background: linear-gradient(180deg, rgba(14, 25, 21, 0.96), rgba(10, 19, 15, 0.96));
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 34px 26px 26px;
            box-shadow:
                0 20px 80px rgba(0, 0, 0, 0.45),
                inset 0 0 0 1px rgba(217, 191, 120, 0.06),
                inset 0 0 35px rgba(110, 150, 110, 0.08);
            overflow: hidden;
        }

        .frame::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(217, 191, 120, 0.12);
            border-radius: 16px;
            pointer-events: none;
        }

        .frame::after {
            content: "";
            position: absolute;
            inset: auto -60px -70px auto;
            width: 240px;
            height: 240px;
            background: radial-gradient(circle, rgba(86, 123, 91, 0.14), transparent 60%);
            filter: blur(12px);
            pointer-events: none;
        }

        .ornament {
            text-align: center;
            color: var(--gold-soft);
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            opacity: 0.85;
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.1;
            font-weight: 600;
            color: var(--gold);
            text-shadow: 0 0 16px rgba(217, 191, 120, 0.14);
        }

        .subtitle {
            margin: 12px auto 28px;
            text-align: center;
            max-width: 560px;
            color: var(--muted);
            font-size: 0.98rem;
            line-height: 1.6;
        }

        .quiz-section {
            display: none;
        }

        .quiz-section.active {
            display: block;
        }

        .meta-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .round-label,
        .score {
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 10px 14px;
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.04em;
        }

        .statements {
            display: grid;
            gap: 14px;
        }

        .statement {
            position: relative;
            padding: 18px 18px 18px 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.015));
            border: 1px solid rgba(217, 191, 120, 0.14);
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }

        .statement::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 4px;
            background: linear-gradient(180deg, rgba(217, 191, 120, 0.22), rgba(112, 148, 108, 0.28));
            opacity: 0.7;
        }

        .statement:hover {
            transform: translateY(-2px);
            border-color: rgba(217, 191, 120, 0.28);
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        }

        .statement.selected {
            border-color: rgba(217, 191, 120, 0.5);
            background:
                linear-gradient(180deg, rgba(217, 191, 120, 0.08), rgba(113, 145, 109, 0.08)),
                rgba(255,255,255,0.02);
            box-shadow: 0 0 0 1px rgba(217, 191, 120, 0.08), 0 10px 26px rgba(0, 0, 0, 0.25);
        }

        .statement.selected::after {
            content: "Selected";
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--gold);
            opacity: 0.9;
        }

        .statement-text {
            margin: 0;
            font-size: 1rem;
            line-height: 1.65;
            color: var(--text);
            padding-right: 74px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            appearance: none;
            border: 1px solid rgba(217, 191, 120, 0.26);
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(34, 49, 41, 0.95), rgba(24, 35, 29, 0.95));
            color: var(--text);
            padding: 14px 18px;
            font: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            flex: 1;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: rgba(217, 191, 120, 0.45);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        button.primary {
            background: linear-gradient(180deg, #7c6740, #5f4c2c);
            color: #f8f1df;
            border-color: rgba(217, 191, 120, 0.55);
            text-shadow: 0 1px 0 rgba(0,0,0,0.22);
        }

        button.primary:hover:not(:disabled) {
            background: linear-gradient(180deg, #8a7347, #6a5530);
        }

        button:disabled {
            opacity: 0.42;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .reveal {
            margin-top: 22px;
        }

        .reveal-content {
            background: linear-gradient(180deg, rgba(29, 41, 35, 0.95), rgba(20, 31, 26, 0.95));
            border: 1px solid var(--warning-border);
            border-radius: 16px;
            padding: 18px;
            box-shadow: inset 0 0 24px rgba(217, 191, 120, 0.03);
        }

        .lie-label {
            margin: 0 0 8px;
            font-size: 0.76rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--gold);
        }

        .lie-text {
            margin: 0 0 10px;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text);
            font-weight: 600;
        }

        .explanation {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .result-message {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
        }

        .result-correct {
            background: var(--correct-bg);
            border: 1px solid var(--correct-border);
            color: #d8f0d6;
        }

        .result-incorrect {
            background: var(--wrong-bg);
            border: 1px solid var(--wrong-border);
            color: #ffd8d1;
        }

        .end-screen {
            text-align: center;
            padding: 8px 4px 4px;
        }

        .end-screen h2 {
            margin: 0 0 12px;
            font-size: 2rem;
            color: var(--gold);
            font-weight: 600;
        }

        .end-score {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px;
            text-shadow: 0 0 18px rgba(217, 191, 120, 0.12);
        }

        .end-text {
            margin: 0 auto 22px;
            max-width: 480px;
            color: var(--muted);
            line-height: 1.7;
            font-size: 1rem;
        }

        .footer-note {
            margin-top: 18px;
            text-align: center;
            color: rgba(185, 176, 155, 0.7);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .frame {
                padding: 24px 16px 18px;
                border-radius: 18px;
            }

            .meta-row {
                flex-direction: column;
                align-items: stretch;
            }

            .round-label,
            .score {
                text-align: center;
            }

            .statement-text {
                padding-right: 0;
            }

            .statement.selected::after {
                position: static;
                display: inline-block;
                margin-top: 10px;
            }

            .controls {
                flex-direction: column;
            }

            .end-score {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="frame">
            <div class="ornament">✦ ❦ ✦</div>
            <h1>Pan's Labyrinth Quiz</h1>
            <p class="subtitle">
                Three statements. One is a lie.
            </p>

            <div id="quiz-container"></div>

            <div class="quiz-section" id="end-screen">
                <div class="end-screen">
                    <h2>The Trial is Complete</h2>
                    <div class="end-score" id="final-score">0/0</div>
                    <p class="end-text">
                        A respectable showing. You are now fully prepared for an evening of dark fairy tales,
                        impossible creatures, and unsettling trivia.
                    </p>
                    <button class="primary" onclick="restartQuiz()">Play Again</button>
                </div>
            </div>

            <div class="footer-note">For movie night use only</div>
        </div>
    </div>

    <script>
        const quizzes = [
            {
                id: 1,
                statements: [
                    "Doug Jones played both the Faun and the Pale Man.",
                    "Pan's Labyrinth won Oscars for Cinematography, Art Direction, and Makeup.",
                    "The film was shot entirely in English and dubbed into Spanish later."
                ],
                lie: 2,
                lieText: "The lie is the third statement. The film was made in Spanish, not shot in English first. Doug Jones did play both creatures, and the film won three Oscars."
            },
            {
                id: 2,
                statements: [
                    "Guillermo del Toro wrote and directed the film.",
                    "The film was released in 2006.",
                    "Pan's Labyrinth is a remake of an older Spanish fantasy film."
                ],
                lie: 2,
                lieText: "The lie is the third statement. Pan's Labyrinth is an original film, not a remake."
            },
            {
                id: 3,
                statements: [
                    "Ivana Baquero was cast after Guillermo del Toro adjusted the role to suit her age.",
                    "Sergi López plays Captain Vidal.",
                    "The role of Ofelia was originally written for an adult woman."
                ],
                lie: 2,
                lieText: "The lie is the third statement. Ofelia was not originally written as an adult woman. Del Toro adapted the character after casting Ivana Baquero."
            },
            {
                id: 4,
                statements: [
                    "The original Spanish title is El laberinto del fauno.",
                    "The film is primarily in Spanish.",
                    "It was produced as a Hollywood studio musical."
                ],
                lie: 2,
                lieText: "The lie is the third statement. Pan's Labyrinth is a dark fantasy drama, not a Hollywood musical."
            },
            {
                id: 5,
                statements: [
                    "Guillermo del Toro has said the film can be read as either literal fantasy or psychological interpretation.",
                    "The creature effects combine prosthetics, costume work, and CGI.",
                    "The film was directed by Alfonso Cuarón."
                ],
                lie: 2,
                lieText: "The lie is the third statement. The film was directed by Guillermo del Toro, not Alfonso Cuarón."
            },
            {
                id: 6,
                statements: [
                    "The film was nominated for Best Foreign Language Film at the Oscars.",
                    "It won three Academy Awards.",
                    "It was Mexico's official submission to the Oscars."
                ],
                lie: 0,
                lieText: "The lie is the first statement. Although it won three Oscars, it was not nominated for Best Foreign Language Film."
            },
            {
                id: 7,
                statements: [
                    "The Faun's Spanish name is 'el fauno.'",
                    "Doug Jones performed in heavy prosthetics and learned lines phonetically.",
                    "The Faun was created entirely as a digital character with no costume or makeup."
                ],
                lie: 2,
                lieText: "The lie is the third statement. The Faun was performed physically by Doug Jones using extensive prosthetics and costume work, with digital enhancement in places."
            },
            {
                id: 8,
                statements: [
                    "The film blends dark fantasy with historical drama.",
                    "It is associated with the Francoist period in Spain.",
                    "It was filmed in black and white to resemble silent cinema."
                ],
                lie: 2,
                lieText: "The lie is the third statement. The film is in colour and is known for its rich visual design, not black-and-white silent-era styling."
            },
            {
                id: 9,
                statements: [
                    "Guillermo del Toro was approached about directing a Harry Potter film.",
                    "He keeps a collection of creepy props and memorabilia in a house he nicknamed 'Bleak House.'",
                    "He later directed Harry Potter and the Half-Blood Prince."
                ],
                lie: 2,
                lieText: "The lie is the third statement. Guillermo del Toro has said he was approached about directing a Harry Potter film, but he never directed one. The 'Bleak House' fact is true — he’s well known for his famously eerie creative collection."
            }
        ];

        let currentRound = 0;
        let score = 0;
        let selectedAnswer = null;
        let revealed = false;

        function renderQuiz() {
            const quiz = quizzes[currentRound];
            const container = document.getElementById("quiz-container");
            const roundNum = currentRound + 1;
            const totalRounds = quizzes.length;

            let html = `
                <div class="quiz-section active">
                    <div class="meta-row">
                        <p class="round-label">Round ${roundNum} of ${totalRounds}</p>
                        <p class="score">Correct answers so far: ${score}</p>
                    </div>
                    <div class="statements">
            `;

            quiz.statements.forEach((statement, index) => {
                const isSelected = selectedAnswer === index;
                html += `
                    <div class="statement ${isSelected ? "selected" : ""}" onclick="selectAnswer(${index})">
                        <p class="statement-text">${statement}</p>
                    </div>
                `;
            });

            html += `</div>`;

            if (revealed) {
                const correct = selectedAnswer === quiz.lie;
                html += `
                    <div class="reveal">
                        <div class="reveal-content">
                            <p class="lie-label">The lie was</p>
                            <p class="lie-text">“${quiz.statements[quiz.lie]}”</p>
                            <p class="explanation">${quiz.lieText}</p>
                            <div class="result-message ${correct ? "result-correct" : "result-incorrect"}">
                                ${correct ? "✓ Correct" : "✗ Incorrect"}
                            </div>
                        </div>
                    </div>
                    <div class="controls">
                        ${
                            currentRound < quizzes.length - 1
                                ? `<button class="primary" onclick="nextRound()">Next Round</button>`
                                : `<button class="primary" onclick="endQuiz()">See Results</button>`
                        }
                    </div>
                `;
            } else {
                html += `
                    <div class="controls">
                        <button class="primary" onclick="revealAnswer()" ${selectedAnswer === null ? "disabled" : ""}>
                            Lock In Answer
                        </button>
                    </div>
                `;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        function selectAnswer(index) {
            if (!revealed) {
                selectedAnswer = index;
                renderQuiz();
            }
        }

        function revealAnswer() {
            if (selectedAnswer === null) return;

            const quiz = quizzes[currentRound];
            if (selectedAnswer === quiz.lie) {
                score++;
            }

            revealed = true;
            renderQuiz();
        }

        function nextRound() {
            currentRound++;
            selectedAnswer = null;
            revealed = false;
            renderQuiz();
        }

        function endQuiz() {
            document.getElementById("quiz-container").innerHTML = "";
            document.getElementById("final-score").textContent = `${score}/${quizzes.length}`;
            document.getElementById("end-screen").classList.add("active");
        }

        function restartQuiz() {
            currentRound = 0;
            score = 0;
            selectedAnswer = null;
            revealed = false;
            document.getElementById("end-screen").classList.remove("active");
            renderQuiz();
        }

        renderQuiz();
    </script>
</body>
</html>
